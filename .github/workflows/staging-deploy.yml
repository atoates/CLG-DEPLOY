name: Deploy to Staging

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run syntax check
        run: node -c apps/admin/server.js
        
      - name: Build frontend
        run: npm run build --workspace=apps/admin
        
      - name: Check build output
        run: |
          if [ ! -d "apps/admin/dist" ]; then
            echo "Build failed - apps/admin/dist directory not created"
            exit 1
          fi
          if [ ! -f "apps/admin/dist/index.html" ]; then
            echo "Build failed - apps/admin/dist/index.html not created"
            exit 1
          fi
          
      - name: Deploy to Railway (Staging)
        run: echo "Railway auto-deploys from develop branch"
