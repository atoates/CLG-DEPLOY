[phases.setup]
nixPkgs = ['nodejs_22']

[phases.install]
cmds = ['npm ci', 'cd ../frontend && npm install']

[phases.build]
# Single shell chain so cwd is always apps/admin after the frontend build (some runners keep cwd per step).
cmds = [
  'cd ../frontend && npx vite build && cd ../admin && rm -rf main-app-dist && cp -r ../frontend/dist main-app-dist && echo "window.BACKEND_URL = \"\";" > main-app-dist/config.js && npm run build',
]

[start]
cmd = 'npm start'
