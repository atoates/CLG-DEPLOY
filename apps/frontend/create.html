<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" href="/favicon-192.png" type="image/png" sizes="192x192" />
  <link rel="apple-touch-icon" href="/favicon-180.png" />
  <title>Create Alert — Crypto Lifeguard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="/config.js"></script>
  <link rel="stylesheet" href="/src/styles.css" />
  <style>
    html.clg-auth-pending body > *:not(#clg-auth-splash) { visibility: hidden; }
    #clg-auth-splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background:
        radial-gradient(900px 600px at 85% -10%, rgba(20, 184, 166, 0.18), transparent 60%),
        radial-gradient(900px 600px at 5% 110%, rgba(59, 130, 246, 0.22), transparent 55%),
        linear-gradient(180deg, #050b1a 0%, #0a1628 50%, #0b1e33 100%);
      color: #e6edf7; font-family: 'Inter', sans-serif;
    }
    #clg-auth-splash .clg-auth-splash-inner {
      display: flex; flex-direction: column; align-items: center; gap: 18px;
    }
    #clg-auth-splash .clg-auth-spinner {
      width: 44px; height: 44px; border-radius: 50%;
      border: 3px solid rgba(94, 234, 212, 0.18); border-top-color: #14b8a6;
      animation: clg-auth-spin 0.9s linear infinite;
    }
    #clg-auth-splash .clg-auth-label {
      font-size: 14px; color: rgba(230, 237, 247, 0.72);
    }
    @keyframes clg-auth-spin { to { transform: rotate(360deg); } }
    html:not(.clg-auth-pending) #clg-auth-splash { display: none; }
  </style>
  <script>
    (function(){
      try {
        document.documentElement.classList.add('clg-auth-pending');
        var backend = (window.BACKEND_URL && window.BACKEND_URL !== '__BACKEND_URL__')
          ? window.BACKEND_URL
          : '';
        var ac = new AbortController();
        var authFetchTimer = setTimeout(function(){ try { ac.abort(); } catch(_) {} }, 18000);
        fetch(backend + '/api/me', { credentials: 'include', signal: ac.signal })
          .then(function(r){ return r.ok ? r.json() : null; })
          .then(function(me){
            if (!me || !me.loggedIn) {
              try {
                var back = window.location.pathname + window.location.search + window.location.hash;
                sessionStorage.setItem('clg_auth_return', back);
              } catch(_) {}
              window.location.replace('/signup.html');
              return;
            }
            try { window.__CLG_ME__ = me; } catch(_) {}
            document.documentElement.classList.remove('clg-auth-pending');
          })
          .catch(function(){ window.location.replace('/signup.html'); })
          .finally(function(){
            try { clearTimeout(authFetchTimer); } catch(_) {}
          });
      } catch(_) {
        document.documentElement.classList.remove('clg-auth-pending');
      }
    })();
  </script>
</head>
<body class="clg-theme-dark">
  <div id="clg-auth-splash" aria-hidden="true">
    <div class="clg-auth-splash-inner">
      <div class="clg-auth-spinner"></div>
      <div class="clg-auth-label">Checking your session…</div>
    </div>
  </div>
  <!-- Consistent dark-blue banner like the home page -->
  <header class="topbar" role="banner">
    <div class="topbar-inner">
      <a class="brand-wrap" href="/" style="text-decoration:none; color:inherit;">
        <img
          class="brand-logo"
          src="/full@4x.png"
          alt="Crypto Lifeguard Logo"
          decoding="async"
          fetchpriority="high"
        />
        <div class="brand-text">
          <h1 class="brand-title">Crypto Lifeguard</h1>
          <p class="brand-tagline">Protect your crypto assets with personalised alerts.</p>
        </div>
      </a>

      <div class="actions">
        <a class="menu-btn" href="/">← Back to app</a>
      </div>
    </div>
  </header>

  <main class="container" style="max-width: 960px;">
    <section class="card" style="margin-top: 12px;">
      <div class="token-select-row" style="justify-content: space-between; margin-bottom: 6px;">
        <h2 class="section-title" style="margin: 0;">New Alert</h2>
        <a href="/" class="btn" style="padding: 8px 12px;">← Back</a>
      </div>

      <form id="alert-form" class="alert-form">
        <div class="form-grid">
          <div>
            <label class="label" for="form-token">Token</label>
            <input id="form-token" class="input" placeholder="e.g., ETH or BTC" list="token-datalist" required />
            <datalist id="token-datalist"></datalist>
          </div>

          <div>
            <label class="label" for="form-severity">Severity</label>
            <select id="form-severity" class="input" required>
              <option value="critical">Critical (🚨)</option>
              <option value="warning">Warning (⚠️)</option>
              <option value="info" selected>Info (🛟)</option>
            </select>
          </div>

          <div class="col-span-2">
            <label class="label" for="form-title">Title</label>
            <input id="form-title" class="input" placeholder="Short, action-oriented title (e.g., ‘Validator maintenance window’)" required />
          </div>

          <div class="col-span-2">
            <label class="label" for="form-description">Description</label>
            <textarea id="form-description" class="input" rows="3" placeholder="Optional details, steps, links…" required></textarea>
          </div>

          <div class="col-span-2">
            <label class="label" for="form-info">Further information (optional)</label>
            <textarea id="form-info" class="input" rows="3" placeholder="Longer context, analysis, or instructions…"></textarea>
          </div>

          <div>
            <label class="label" for="form-deadline">Deadline</label>
            <input id="form-deadline" class="input" type="datetime-local" required />
          </div>

          <div>
            <label class="label" for="form-source-type">Source</label>
            <div class="row">
              <select id="form-source-type" class="input" style="height:36px">
                <option value="">— Select type —</option>
                <option value="anonymous">🙈 Anonymous</option>
                <option value="mainstream-media">📰 Mainstream media</option>
                <option value="trusted-source">✅ Trusted source</option>
                <option value="social-media">💬 Social media</option>
                <option value="dev-team">🛠️ Dev. Team</option>
              </select>
              <input id="form-source-url" class="input" placeholder="https://… (optional)" />
            </div>
          </div>

          <div>
            <label class="label">Tags</label>
            <div id="tag-selectors" class="tag-filters" style="padding: 10px 0;"></div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-teal" id="submit-btn">Create alert</button>
          </div>
        </div>

        <p id="msg" class="muted" style="margin-top:10px"></p>
        <p class="muted">Note: Creating alerts requires admin authorization. If unauthorized, the request will be rejected.</p>
      </form>
    </section>
  </main>

  <footer class="footer muted">
    <span>© 2026 Crypto Lifeguard</span>
  </footer>

  <!-- Backend configuration (must load before page script) -->
  <script type="module" src="/src/config.js"></script>
  <!-- IMPORTANT: module so Vite bundles it -->
  <script type="module" src="/src/create.js"></script>
  <!-- Sentinel AI chat widget -->
  <script>window.CLG_CHAT_CONTEXT = { page: 'create' };</script>
  <script type="module" src="/src/chat.js"></script>
</body>
</html>
