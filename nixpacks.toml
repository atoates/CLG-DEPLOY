# Admin + main app image. Railway: leave Root Directory blank (repo root).

[phases.install]
cmds = ['npm ci', 'cd apps/frontend && npm install']

[phases.build]
cmds = [
  'curl -fsSL https://nodejs.org/dist/v22.14.0/node-v22.14.0-linux-x64.tar.xz | tar -xJ --strip-components=1 -C /usr/local/ && node --version && cd apps/frontend && npx vite build && cd ../admin && rm -rf main-app-dist && cp -r ../frontend/dist main-app-dist && echo "window.BACKEND_URL = \"\";" > main-app-dist/config.js && npm run build',
]

[start]
cmd = 'cd apps/admin && npm start'
